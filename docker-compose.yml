version: '3.8'

# 定义网络
networks:
  app-network:
    driver: bridge
    name: agriculture-qr-network

# 定义服务
services:
  web:
    # 服务名称
    container_name: agriculture-qr-app
    
    # 构建配置
    build:
      context: .
      dockerfile: Dockerfile
    
    # 端口映射
    ports:
      - "80:80"
    
    # 环境变量
    environment:
      - NODE_ENV=production
      - VITE_CONVEX_URL=https://your-project-name.convex.cloud
    
    # 卷映射（可选，用于持久化数据）
    volumes:
      # 可选：如果需要持久化日志
      # - ./logs:/var/log/nginx
      
    # 网络配置
    networks:
      - app-network
    
    # 重启策略
    restart: unless-stopped
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: '512M'
    
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s