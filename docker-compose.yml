version: '3.8'

# 定义网络
networks:
  app-network:
    driver: bridge
    name: agriculture-qr-network

# 定义服务
services:
  # PostgreSQL 数据库服务
  db:
    image: postgres:15-alpine
    container_name: agriculture-qr-db
    environment:
      POSTGRES_DB: ${DB_NAME:-agriculture_qr}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agriculture-qr-app
    ports:
      - "80:80"
    environment:
      DB_NAME: ${DB_NAME:-agriculture_qr}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-django-insecure-om^-)$8_s3yc@zltu+x=29ezcu&=b5ws!7o18!q8691!(1r+$8}
      DEBUG: ${DEBUG:-False}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# 定义卷
volumes:
  postgres_data:
    name: agriculture-qr-postgres-data